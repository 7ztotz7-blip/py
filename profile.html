<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>py — โปรไฟล์ & ความสำเร็จ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link href="pystart.css" rel="stylesheet" />
<style>
  body{padding-bottom:70px;}
  .wrap{max-width:1080px;}

  /* profile header */
  .phead{position:relative;overflow:hidden;margin-top:30px;border-radius:24px;padding:38px 40px;color:#fff;
    background:
      radial-gradient(600px 300px at 88% -20%,oklch(0.64 0.16 278/.55),transparent 64%),
      radial-gradient(500px 360px at 6% 120%,oklch(0.58 0.15 200/.45),transparent 60%),
      linear-gradient(150deg,oklch(0.4 0.13 290),oklch(0.3 0.1 294));
    box-shadow:var(--shadow-lg);}
  .phead::after{content:"";position:absolute;inset:0;opacity:.4;pointer-events:none;
    background-image:radial-gradient(circle at 1px 1px,oklch(1 0 0/.1) 1px,transparent 0);background-size:24px 24px;}
  .ph-row{position:relative;z-index:2;display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
  .ph-av{width:96px;height:96px;border-radius:28px;flex-shrink:0;display:grid;place-items:center;font-size:40px;font-weight:600;color:#fff;
    background:linear-gradient(140deg,oklch(0.72 0.13 30),oklch(0.55 0.16 12));box-shadow:0 1px 0 oklch(1 0 0/.4) inset,0 16px 30px -10px oklch(0 0 0/.5);border:2px solid oklch(1 0 0/.2);}
  .ph-id{flex:1;min-width:200px;}
  .ph-id h1{font-size:30px;font-weight:600;letter-spacing:-.02em;}
  .ph-id .handle{color:oklch(0.88 0.03 250);font-size:15px;margin-top:4px;font-family:'IBM Plex Mono',monospace;}
  .ph-id .joined{color:oklch(0.82 0.03 250);font-size:13.5px;margin-top:10px;display:inline-flex;align-items:center;gap:7px;}
  .ph-level{position:relative;z-index:2;text-align:center;background:oklch(1 0 0/.1);border:1px solid oklch(1 0 0/.2);border-radius:18px;padding:18px 26px;backdrop-filter:blur(8px);}
  .ph-level .lv{font-size:34px;font-weight:600;letter-spacing:-.02em;line-height:1;}
  .ph-level .ll{font-size:12.5px;color:oklch(0.88 0.03 250);margin-top:5px;letter-spacing:.05em;text-transform:uppercase;}
  .ph-level .lbar{width:120px;height:6px;border-radius:100px;background:oklch(1 0 0/.2);overflow:hidden;margin-top:11px;}
  .ph-level .lbar i{display:block;height:100%;width:62%;background:#fff;border-radius:100px;}
  .ph-level .lx{font-size:11px;color:oklch(0.85 0.03 250);margin-top:7px;font-family:'IBM Plex Mono',monospace;}

  /* stat strip */
  .strip{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:22px;}
  .sc{background:linear-gradient(180deg,#fff,var(--soft));border:1px solid var(--line);border-radius:17px;padding:20px;box-shadow:var(--shadow-sm);}
  .sc .ic{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:19px;margin-bottom:13px;}
  .sc .n{font-size:26px;font-weight:600;letter-spacing:-.02em;line-height:1;}
  .sc .l{font-size:13px;color:var(--muted);margin-top:6px;}

  @media (max-width:900px){.strip{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body data-fx=".topbar, .phead, .strip > .sc" data-fx-count=".strip .sc .n, .ph-level .lv">
<script>
(function(){var b=document.body,s=b.getAttribute('data-fx');if(!s)return;document.documentElement.classList.add('js-fx');if(matchMedia('(prefers-reduced-motion: reduce)').matches)return;var st=document.createElement('style');st.textContent='.js-fx :is('+s+'){transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)}.js-fx :is('+s+'):not(.fx-shown){opacity:0;transform:translateY(22px)}';document.head.appendChild(st);})();
</script>

<header class="topbar">
  <a class="tb-logo" href="index.html"><span class="tb-mk">py</span>py</a>
  <nav class="tb-nav">
    <a href="index.html">หน้าแรก</a>
    <a href="courses.html">หลักสูตร</a>
    <a href="dashboard.html">แดชบอร์ด</a>
    <a href="profile.html" class="cur">โปรไฟล์</a>
  </nav>
  <div class="tb-right">
    <span class="chiplet" style="color:var(--accent-deep)" id="xpChiplet">⭐ 0 XP</span>
    <button class="btn btn-ghost sm" id="signOutBtn" type="button">ออกจากระบบ</button>
    <a class="tb-av" href="profile.html" id="tbAvatar">?</a>
  </div>
</header>

<div class="wrap">
  <!-- HEADER -->
  <section class="phead">
    <div class="ph-row">
      <div class="ph-av" id="profAvatar">?</div>
      <div class="ph-id">
        <h1 id="profName">กำลังโหลด...</h1>
        <div class="handle" id="profHandle"></div>
        <div class="joined"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg><span id="profJoined">—</span></div>
      </div>
      <div class="ph-level">
        <div class="lv" id="profLevel">Lv.1</div>
        <div class="ll">นักเรียนขยัน</div>
        <div class="lbar"><i id="profLevelBar"></i></div>
        <div class="lx" id="profXpLabel">0 / 2,000 XP</div>
      </div>
    </div>
  </section>

  <!-- STAT STRIP -->
  <div class="strip">
    <div class="sc"><div class="ic" style="background:var(--accent-soft);color:var(--accent-deep)">📖</div><div class="n" id="statLessons">0</div><div class="l">บทที่เรียนจบ</div></div>
    <div class="sc"><div class="ic" style="background:var(--ok-soft);color:var(--ok-deep)">✅</div><div class="n" id="statTests">0</div><div class="l">แบบฝึกหัดที่ทำผ่าน</div></div>
  </div>
</div>

<script type="module">
  import { auth } from './assets/js/firebase.js';
  import { signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { requireUser, loadProgress, loadProfile } from './assets/js/progress-store.js';

  document.getElementById('signOutBtn').addEventListener('click', async ()=>{
    await signOut(auth);
    location.href='index.html';
  });

  const user = await requireUser();
  if(!user) throw new Error('redirecting to login'); // requireUser() already navigated away

  // the signup form saves the chosen name to Firestore directly — read it
  // from there rather than the Auth profile field, which can lag behind
  // right after signup.
  const profileDoc = await loadProfile(user.uid);
  const displayName = profileDoc.name || user.displayName || user.email.split('@')[0];
  const initial = displayName.trim().charAt(0).toUpperCase() || '?';
  document.getElementById('profAvatar').textContent = initial;
  document.getElementById('tbAvatar').textContent = initial;
  document.getElementById('profName').textContent = displayName;
  document.getElementById('profHandle').textContent = '@'+user.email.split('@')[0]+' · ผู้เรียนมือใหม่';
  const joined = user.metadata && user.metadata.creationTime ? new Date(user.metadata.creationTime) : null;
  document.getElementById('profJoined').textContent = joined
    ? ('เข้าร่วมเมื่อ '+joined.toLocaleDateString('th-TH',{year:'numeric',month:'long'}))
    : 'เข้าร่วมแล้ว';

  const { completed, unitScores } = await loadProgress(user.uid);
  const xp = completed.length*15;
  const testsPassed = Object.values(unitScores).reduce((n,u)=>n+(u.pre?1:0)+(u.post?1:0),0);
  document.getElementById('statLessons').textContent = completed.length;
  document.getElementById('statTests').textContent = testsPassed;
  document.getElementById('xpChiplet').textContent = '⭐ '+xp.toLocaleString('en-US')+' XP';
  const level = Math.max(1, Math.floor(xp/400)+1);
  const xpIntoLevel = xp % 400, levelTarget = 400;
  document.getElementById('profLevel').textContent = 'Lv.'+level;
  document.getElementById('profXpLabel').textContent = xp.toLocaleString('en-US')+' / '+((level)*400).toLocaleString('en-US')+' XP';
  const levelBar=document.getElementById('profLevelBar');
  const levelPct=Math.round((xpIntoLevel/levelTarget)*100);
  levelBar.style.width='0';
  requestAnimationFrame(()=>{levelBar.style.transition='width 1s cubic-bezier(.2,.7,.2,1)';levelBar.style.width=levelPct+'%';});
</script>
<script src="pystart-fx.js"></script>
</body>
</html>
